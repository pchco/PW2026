<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerador de Usuários</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>Gerador de Usuários</header>
    <div class="formUser">
      <!-- Info do Gênero -->
      <div>
        Gênero
        <input type="radio" name="g" /> Aleatório
        <input type="radio" name="g" /> Homem
        <input type="radio" name="g" /> Mulher
      </div>

      <!-- Info da Nacionalidade -->
      <div>
        Nacionalidade
        <select id="nat">
          <option value="br">Brasil</option>
          <option value="es">Espanha</option>
          <option value="fr">França</option>
          <option value="us">Estados Unidos</option>
        </select>
      </div>

      <!-- Info Quantidade -->
      <div>
        Quantidade
        <select id="qt">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </div>
      <button>Gerar Usuários</button>
    </div>
    <hr />

    <div class="allUsers">
      <div class="user">
        <div class="avatar">
          <img src="" />
          <div class="data">
            <p>Nome: Célio</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
