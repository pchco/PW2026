    <style>
      @import url("https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");

    <title>Personagens Dragon Ball</title>

  <body>
    <header>PERSONAGENS DE DRAGON BALL Z</header>

    <div class="formUser">
      <!-- Info do genero -->
      <div>
        <span class="tituloFiltro">Gênero</span>
        <input type="radio" name="g" checked /> Ambos
        <input type="radio" name="g" value="male" /> Homem
        <input type="radio" name="g" value="female" /> Mulher
      </div>

      <!-- Info da raça -->
      <div>
        <span class="tituloFiltro">Raça</span>
        <select id="race">
          <option value="">Todas</option>
          <option value="Human">Humano</option>
          <option value="Saiyan">Saiyajin</option>
          <option value="Android">Android</option>
          <option value="God">Deus</option>
          <option value="Angel">Anjo</option>
          <option value="Frieza Race">Raça Frieza</option>
          <option value="Nucleico benigno">Kaiohshins</option>
          <option value="Unknown">Desconhecida</option>
        </select>

        <button onclick="buscar()">Buscar Personagens</button>
      </div>
    </div>
