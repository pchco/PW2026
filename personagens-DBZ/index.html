  <body>
    <header>Personagens Dragon Ball</header>

    <div class="formUser">
      <!-- Info do genero -->
      <div>
        <span style="color: rgb(235, 86, 86)">Gênero</span>
        <input type="radio" name="g" checked /> Ambos
        <input type="radio" name="g" value="male" /> Homem
        <input type="radio" name="g" value="female" /> Mulher
      </div>

      <!-- Info da nacionalidade -->
      <div>
        <span style="color: rgb(235, 86, 86)">Raça</span>
        <select id="race">
          <option value="">Todas</option>
          <option value="Human">Humano</option>
          <option value="Saiyan">Saiyajin</option>
          <option value="Android">Android</option>
          <option value="God">Deus</option>
          <option value="Angel">Anjo</option>
          <option value="Frieza Race">Raça Frieza</option>
          <option value="Nucleico benigno">Kaiohshins</option>
          <option value="Unknown">Desconhecida</option>
        </select>
      </div>
